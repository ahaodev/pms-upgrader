name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/release.jks

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/release.jks

      - name: Publish release
        uses: ahaodev/pms-releaser@main
        with:
          file_path: './app/build/outputs/apk/release/app-release.apk'
          version: ${{ github.ref_name }}
          project_name: 'Test'
          package_name: 'debug'
          artifact_name: 'pms-upgrader'
          os: 'android'
          arch: 'universal'
          access_token: ${{ secrets.PMS_TOKEN }}
          release_url: ${{ secrets.PMS_URL }}
